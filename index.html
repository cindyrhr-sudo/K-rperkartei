<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomie Profi - Lern-App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tafel-gruen: #1e3d2f; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--tafel-gruen);
            touch-action: manipulation;
        }

        /*
         * SCALING SYSTEM:
         * #app-scaler is the reference frame. It has a fixed design size (640×900).
         * JS reads the window size and sets transform: scale() on it so the whole
         * app scales proportionally when the window gets smaller than the design size.
         *
         * BUT before scaling kicks in, the inner layout is flexible:
         * clamp() values on font/padding/gap let elements compress naturally first.
         * Only once that's exhausted does the outer scale shrink everything uniformly.
         */
        #app-scaler {
            width: 640px;
            min-height: 900px;
            transform-origin: top center;
            position: absolute;
            top: 0;
            left: 50%;
            translate: -50% 0;
        }

        .inner-wrap {
            padding: clamp(8px, 2vw, 32px);
            display: flex;
            flex-direction: column;
            gap: clamp(4px, 1vw, 12px);
            min-height: 900px;
        }

        /* ── Rang ── */
        #rank-display {
            background-color: rgba(250,204,21,0.2);
            color: #facc15;
            text-align: center;
            font-weight: 900;
            padding: clamp(4px, 1vw, 16px) clamp(6px, 1.5vw, 16px);
            border-radius: 8px;
            border: 1px solid rgba(250,204,21,0.3);
            border-left: 12px solid rgba(250,204,21,0.4);
            font-size: clamp(8px, 1.4vw, 13px);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        /* ── Fortschritt ── */
        .progress-section {
            background: rgba(0,0,0,0.2);
            padding: clamp(4px, 1vw, 12px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: clamp(2px, 0.5vw, 6px);
            flex-shrink: 0;
        }
        .progress-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .progress-label {
            font-size: clamp(7px, 1.1vw, 10px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .progress-value {
            font-size: clamp(7px, 1.1vw, 10px);
            font-weight: 900;
        }
        .progress-track {
            width: 100%;
            height: clamp(3px, 0.5vw, 6px);
            background: rgba(0,0,0,0.4);
            border-radius: 9999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.5s ease;
        }

        /* ── Boxen ── */
        .boxes-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(4px, 1vw, 8px);
            background: rgba(255,255,255,0.05);
            padding: clamp(4px, 1vw, 16px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .box-cell {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: clamp(3px, 0.8vw, 10px) clamp(2px, 0.5vw, 8px);
            border-radius: 8px;
            min-width: 0;
            color: white;
        }
        .box-label {
            font-size: clamp(7px, 1.1vw, 10px);
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
        .box-count {
            font-size: clamp(14px, 3vw, 26px);
            font-weight: 900;
            line-height: 1;
        }

        /* ── Main bar ── */
        .main-bar-track {
            width: 100%;
            height: clamp(3px, 0.5vw, 8px);
            background: rgba(0,0,0,0.4);
            border-radius: 9999px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        /* ── Card area ── */
        .card-area {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        /* ── Index Card Base ── */
        .index-card {
            background: #fdf5e6;
            background-image:
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                radial-gradient(circle, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 100% 2.5rem, 3px 3px;
            border: 1px solid #e5d3b3;
            border-bottom: 3px solid #d4c19d;
            border-right: 2px solid #d4c19d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* ── Start screen ── */
        #start-screen {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: clamp(8px, 2vw, 32px);
            text-align: center;
        }
        #start-screen.hidden { display: none; }
        .start-emoji {
            font-size: clamp(40px, 8vw, 80px);
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .start-title {
            font-size: clamp(14px, 3vw, 28px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: #334155;
        }
        .start-sub {
            font-size: clamp(10px, 1.8vw, 16px);
            color: #64748b;
            font-style: italic;
            margin-top: 4px;
        }
        .start-btn {
            width: 100%;
            max-width: 280px;
            background: #2563eb;
            color: white;
            font-size: clamp(12px, 2.5vw, 22px);
            font-weight: 900;
            padding: clamp(8px, 1.5vw, 20px);
            border-radius: 16px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s;
        }
        .start-btn:active { transform: scale(0.95); }
        .reset-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: clamp(8px, 1.2vw, 11px);
            text-decoration: underline;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.5;
            margin-top: 4px;
        }
        .reset-btn:hover { opacity: 1; }

        /* ── Interactive UI ── */
        #interactive-ui {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            padding: clamp(8px, 2vw, 24px);
            overflow: hidden;
        }
        #interactive-ui.hidden { display: none; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(4px, 1vw, 16px);
            flex-shrink: 0;
        }
        .cat-badge {
            background: #e2e8f0;
            padding: 2px clamp(4px, 0.8vw, 12px);
            border-radius: 9999px;
            font-size: clamp(8px, 1.2vw, 12px);
            font-weight: 700;
            text-transform: uppercase;
            color: #475569;
        }
        .type-label {
            font-size: clamp(8px, 1.2vw, 12px);
            font-weight: 900;
            color: #2563eb;
        }
        #task-context {
            background: #eff6ff;
            padding: clamp(4px, 1vw, 16px);
            border-radius: 12px;
            border-left: 4px solid #3b82f6;
            font-style: italic;
            font-size: clamp(9px, 1.5vw, 14px);
            margin-bottom: clamp(4px, 1vw, 16px);
            flex-shrink: 0;
        }
        #task-context.hidden { display: none; }
        #task-q {
            font-size: clamp(11px, 2vw, 20px);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: clamp(4px, 1vw, 16px);
            flex-shrink: 0;
            color: #1e293b;
        }
        #options-box {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: clamp(3px, 0.7vw, 10px);
            margin-bottom: clamp(4px, 1vw, 12px);
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: clamp(5px, 1.2vw, 14px) clamp(6px, 1.5vw, 16px);
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: white;
            font-size: clamp(9px, 1.6vw, 15px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #1e293b;
            flex-shrink: 0;
        }
        .option-btn:hover { background: #f8fafc; border-color: #94a3b8; }

        #feedback-box {
            padding: clamp(6px, 1.2vw, 16px);
            border-radius: 16px;
            border: 2px solid;
            display: flex;
            flex-direction: column;
            gap: clamp(3px, 0.6vw, 10px);
            background: white;
            flex-shrink: 0;
        }
        #feedback-box.hidden { display: none; }
        .feedback-top {
            display: flex;
            align-items: center;
            gap: clamp(4px, 1vw, 16px);
        }
        #feedback-icon { font-size: clamp(14px, 2.5vw, 24px); }
        #feedback-title {
            font-weight: 900;
            font-size: clamp(11px, 2vw, 20px);
        }
        #task-r {
            font-size: clamp(9px, 1.5vw, 16px);
            font-weight: 500;
            color: #475569;
            line-height: 1.4;
        }
        .next-btn {
            width: 100%;
            background: #0f172a;
            color: white;
            padding: clamp(6px, 1.2vw, 16px);
            border-radius: 12px;
            border: none;
            font-size: clamp(9px, 1.5vw, 14px);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .next-btn:active { transform: scale(0.95); }

        /* ── Flashcard ── */
        #flashcard-ui {
            position: absolute;
            inset: 0;
            z-index: 20;
            perspective: 1500px;
        }
        #flashcard-ui.hidden { display: none; }
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
            transform-style: preserve-3d;
            height: 100%;
            position: relative;
        }
        .card-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: clamp(8px, 2vw, 32px);
        }
        .card-face-back { transform: rotateY(180deg); }
        .card-face-header {
            position: absolute;
            top: clamp(6px, 1.5vw, 24px);
            left: clamp(8px, 2vw, 32px);
            right: clamp(8px, 2vw, 32px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #self-q {
            font-size: clamp(12px, 2.5vw, 24px);
            font-weight: 700;
            margin-top: clamp(20px, 4vw, 40px);
            color: #1e293b;
            line-height: 1.3;
        }
        .flip-btn {
            margin-top: clamp(8px, 2vw, 32px);
            background: #2563eb;
            color: white;
            padding: clamp(6px, 1.2vw, 16px) clamp(12px, 2.5vw, 32px);
            border-radius: 16px;
            border: none;
            font-size: clamp(9px, 1.5vw, 14px);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .flip-btn:active { transform: scale(0.95); }
        #self-a {
            font-size: clamp(12px, 2.5vw, 24px);
            font-weight: 900;
            color: #2d4a2e !important;
            margin-top: clamp(20px, 4vw, 40px);
            margin-bottom: clamp(4px, 1vw, 12px);
        }
        #self-r {
            font-size: clamp(9px, 1.5vw, 15px);
            color: #334155;
            font-style: italic;
            margin-bottom: clamp(8px, 2vw, 32px);
            line-height: 1.4;
        }
        .result-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(4px, 1vw, 16px);
            width: 100%;
        }
        .result-btn {
            padding: clamp(6px, 1.5vw, 20px);
            border-radius: 16px;
            border: none;
            color: white;
            font-size: clamp(9px, 1.5vw, 14px);
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s;
        }
        .result-btn:active { transform: scale(0.95); }

        /* ── Pulse animation ── */
        @keyframes pulse-box {
            0% { transform: scale(1); }
            40% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .pulse-fast { animation: pulse-box 0.35s cubic-bezier(0.175,0.885,0.32,1.275); }

        /* ── Level-Up Overlay ── */
        #level-up-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        #level-up-overlay.hidden { display: none; }
        #confetti-area {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .level-up-card {
            background: #facc15;
            border-radius: 3rem;
            padding: clamp(16px, 4vw, 40px);
            max-width: 360px;
            width: 100%;
            position: relative;
            z-index: 220;
            border: 8px solid white;
        }
        .level-up-trophy { font-size: clamp(40px, 8vw, 72px); margin-bottom: 8px; }
        .level-up-title {
            font-size: clamp(18px, 4vw, 32px);
            font-weight: 900;
            color: #713f12;
            text-transform: uppercase;
            font-style: italic;
            margin-bottom: 8px;
        }
        #new-rank-name {
            font-size: clamp(14px, 3vw, 22px);
            font-weight: 900;
            color: white;
            background: rgba(180,120,0,0.2);
            padding: clamp(8px, 2vw, 16px);
            border-radius: 16px;
            border: 2px solid rgba(180,120,0,0.3);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: clamp(16px, 3vw, 32px);
        }
        .level-up-close-btn {
            width: 100%;
            background: #0f172a;
            color: white;
            font-size: clamp(12px, 2.5vw, 20px);
            font-weight: 700;
            padding: clamp(8px, 2vw, 20px);
            border-radius: 16px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .level-up-close-btn:active { transform: scale(0.95); }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            top: -20px;
            z-index: 210;
            animation: confetti-fall 3.5s linear forwards;
        }
    </style>
</head>
<body>

    <!-- Level-Up Overlay -->
    <div id="level-up-overlay" class="hidden">
        <div id="confetti-area"></div>
        <div class="level-up-card">
            <div class="level-up-trophy">🏆</div>
            <div class="level-up-title">Neuer Rang!</div>
            <div id="new-rank-name">Rang Name</div>
            <button class="level-up-close-btn" onclick="closeLevelUp()">WEITER</button>
        </div>
    </div>

    <!-- Scalable container -->
    <div id="app-scaler">
        <div class="inner-wrap">

            <!-- Rang -->
            <div id="rank-display">LÄDT... ⏳</div>

            <!-- Fortschritt -->
            <div class="progress-section">
                <div class="progress-label-row">
                    <span class="progress-label" style="color:rgba(250,204,21,0.8);">Nächster Rang</span>
                    <span class="progress-value" id="level-progress-text" style="color:#facc15;">0/10</span>
                </div>
                <div class="progress-track">
                    <div id="level-progress-bar" class="progress-fill" style="background:#eab308;width:0%"></div>
                </div>
                <div class="progress-label-row" style="margin-top:2px;">
                    <span class="progress-label" style="color:rgba(255,255,255,0.5);">Gesamtweg zum Profi</span>
                    <span class="progress-value" id="total-progress-text" style="color:rgba(255,255,255,0.7);">0/89</span>
                </div>
                <div class="progress-track">
                    <div id="total-progress-bar" class="progress-fill" style="background:#3b82f6;width:0%"></div>
                </div>
            </div>

            <!-- Boxen -->
            <div class="boxes-grid">
                <div class="box-cell" style="background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.3);">
                    <div class="box-label">Box 1</div>
                    <div id="box1-count" class="box-count">0</div>
                </div>
                <div class="box-cell" style="background:rgba(168,85,247,0.2);border:1px solid rgba(168,85,247,0.3);">
                    <div class="box-label">Box 2</div>
                    <div id="box2-count" class="box-count">0</div>
                </div>
                <div class="box-cell" style="background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.3);">
                    <div class="box-label">Box 3</div>
                    <div id="box3-count" class="box-count">0</div>
                </div>
                <div class="box-cell" style="background:rgba(122,156,123,0.2);border:1px solid #7a9c7b;color:#7a9c7b;">
                    <div class="box-label" style="opacity:0.9;font-style:italic;">Gelernt</div>
                    <div id="box4-count" class="box-count">0</div>
                </div>
            </div>

            <!-- Main progress bar -->
            <div class="main-bar-track">
                <div id="progress-bar" style="height:100%;background:#facc15;border-radius:9999px;transition:width 0.7s ease;width:0%"></div>
            </div>

            <!-- Card area -->
            <div class="card-area">

                <!-- Start Screen -->
                <div id="start-screen" class="index-card">
                    <div class="start-emoji">🦴</div>
                    <div>
                        <div class="start-title">Challenge bereit!</div>
                        <div class="start-sub">Wir trainieren heute 10 Karten aus deinen Boxen.</div>
                    </div>
                    <div style="width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;">
                        <button class="start-btn" onclick="startSession()">Sitzung starten</button>
                        <button class="reset-btn" onclick="resetProgress()">Fortschritt zurücksetzen</button>
                    </div>
                </div>

                <!-- Interactive UI -->
                <div id="interactive-ui" class="index-card hidden">
                    <div class="card-header">
                        <span id="task-cat" class="cat-badge">Kategorie</span>
                        <span id="task-type-label" class="type-label">MODUS</span>
                    </div>
                    <div id="task-context">Context</div>
                    <div id="task-q">Frage?</div>
                    <div id="options-box"></div>
                    <div id="feedback-box" class="hidden">
                        <div class="feedback-top">
                            <div id="feedback-icon"></div>
                            <div id="feedback-title">Feedback</div>
                        </div>
                        <p id="task-r"></p>
                        <button class="next-btn" onclick="handleNext()">NÄCHSTE KARTE</button>
                    </div>
                </div>

                <!-- Flashcard UI -->
                <div id="flashcard-ui" class="hidden">
                    <div id="card-inner-element" class="card-inner">
                        <!-- Front -->
                        <div class="card-face index-card">
                            <div class="card-face-header">
                                <span id="self-cat" class="cat-badge">Thema</span>
                                <span style="font-size:clamp(8px,1.2vw,10px);font-weight:900;color:#2563eb;text-transform:uppercase;letter-spacing:0.1em;">Antworten</span>
                            </div>
                            <div id="self-q">Frage?</div>
                            <button class="flip-btn" onclick="flipCard()">ANTWORT ZEIGEN</button>
                        </div>
                        <!-- Back -->
                        <div class="card-face card-face-back index-card">
                            <div class="card-face-header">
                                <span id="self-cat-back" class="cat-badge">Thema</span>
                                <span style="font-size:clamp(8px,1.2vw,10px);font-weight:900;color:#7a9c7b;text-transform:uppercase;letter-spacing:0.1em;">Lösung</span>
                            </div>
                            <div id="self-a">Antwort</div>
                            <div id="self-r"></div>
                            <div class="result-btns">
                                <button class="result-btn" style="background:#bc7a7a;" onclick="handleResult(false)">Falsch</button>
                                <button class="result-btn" style="background:#7a9c7b;" onclick="handleResult(true)">Richtig</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- /card-area -->
        </div><!-- /inner-wrap -->
    </div><!-- /app-scaler -->

    <script>
    // ── SCALING ──────────────────────────────────────────────────
    // Design size: 640 wide, 900 tall
    // Phase 1: layout compresses via clamp() values
    // Phase 2: once window is smaller than design, scale() kicks in
    const DESIGN_W = 640;
    const DESIGN_H = 900;

    function rescale() {
        const scaler = document.getElementById('app-scaler');
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        const scaleX = vw / DESIGN_W;
        const scaleY = vh / DESIGN_H;
        const scale = Math.min(scaleX, scaleY);

        if (scale < 1) {
            scaler.style.transform = `scale(${scale})`;
            scaler.style.transformOrigin = 'top center';
            // center vertically too when very small
            const scaledH = DESIGN_H * scale;
            const topOffset = Math.max(0, (vh - scaledH) / 2);
            scaler.style.top = topOffset + 'px';
        } else {
            scaler.style.transform = '';
            scaler.style.top = '0';
        }
    }

    window.addEventListener('resize', rescale);
    rescale();

    // ── APP DATA ──────────────────────────────────────────────────
    const cardsData = [

        { "id": 87, "type": "mc", "cat": "Haut", "q": "In welcher Hautschicht sitzen die Schweißdrüsen und Haarwurzeln?", "opts": ["Oberhaut", "Lederhaut", "Unterhaut", "Knochenhaut"], "correct": 1, "r": "Korrekt! Die Lederhaut ist die 'Arbeitsschicht' mit Drüsen und Gefäßen." },

    ];

    let userProgress = {};
    let currentSession = [];
    let currIdx = 0;
    let isAnswered = false;
    let lastRankIndex = -1;

    const ranks = [
        { threshold: 89, name: "Professor der Anatomie 🎓" },
        { threshold: 70, name: "Meister der Medizin 🩺" },
        { threshold: 45, name: "Körper-Profi 🏃‍♂️" },
        { threshold: 25, name: "Organ-Experte 🫀" },
        { threshold: 10, name: "Skelett-Spürnase 🦴" },
        { threshold: 0,  name: "Anatomie-Lehrling 🐣" }
    ];

    function init() {
        const saved = localStorage.getItem('anatomie_profi_final_v1');
        if (saved) {
            userProgress = JSON.parse(saved);
            cardsData.forEach(c => { if (!userProgress[c.id]) userProgress[c.id] = 1; });
        } else {
            cardsData.forEach(c => userProgress[c.id] = 1);
        }
        updateStats(true);
    }

    function updateStats(silent = false) {
        const counts = {1:0,2:0,3:0,4:0};
        Object.values(userProgress).forEach(v => counts[v]++);
        for (let i = 1; i <= 4; i++) {
            const el = document.getElementById(`box${i}-count`);
            if (el) {
                el.innerText = counts[i];
                el.parentElement.classList.remove('pulse-fast');
                void el.parentElement.offsetWidth;
                el.parentElement.classList.add('pulse-fast');
            }
        }
        const learned = counts[4];
        const total = cardsData.length;
        let currentRankIndex = ranks.findIndex(r => learned >= r.threshold);
        const currentRank = ranks[currentRankIndex];
        const display = document.getElementById('rank-display');
        if (display) display.innerText = currentRank.name;

        const nextRank = ranks[currentRankIndex - 1];
        const levelText = document.getElementById('level-progress-text');
        const levelBar  = document.getElementById('level-progress-bar');
        if (nextRank) {
            const curr = currentRank.threshold;
            const next = nextRank.threshold;
            const prog = learned - curr;
            const need = next - curr;
            levelText.innerText = `${prog}/${need}`;
            levelBar.style.width = Math.min(100, (prog / need * 100)) + '%';
        } else {
            levelText.innerText = 'MAX';
            levelBar.style.width = '100%';
            levelBar.style.background = '#22c55e';
        }

        document.getElementById('total-progress-text').innerText = `${learned}/${total}`;
        document.getElementById('total-progress-bar').style.width = Math.min(100, (learned / total * 100)) + '%';
        const pBar = document.getElementById('progress-bar');
        if (pBar) pBar.style.width = (learned / total * 100) + '%';

        if (!silent && currentRankIndex !== lastRankIndex && lastRankIndex !== -1) {
            showLevelUp(currentRank.name);
        }
        lastRankIndex = currentRankIndex;
    }

    function startSession() {
        const getBox = n => cardsData.filter(c => userProgress[c.id] === n).sort(() => Math.random() - 0.5);
        let b1 = getBox(1), b2 = getBox(2), b3 = getBox(3);
        currentSession = [...b1.slice(0,5), ...b2.slice(0,3), ...b3.slice(0,2)];
        if (currentSession.length < 10) {
            const rest = cardsData.filter(c => !currentSession.find(s => s.id === c.id) && userProgress[c.id] < 4).sort(() => Math.random() - 0.5);
            currentSession = [...currentSession, ...rest.slice(0, 10 - currentSession.length)];
        }
        currIdx = 0;
        document.getElementById('start-screen').classList.add('hidden');
        showCard();
    }

    function showCard() {
        isAnswered = false;
        const card = currentSession[currIdx];
        document.getElementById('feedback-box').classList.add('hidden');
        if (card.type === 'self') {
            document.getElementById('interactive-ui').classList.add('hidden');
            document.getElementById('flashcard-ui').classList.remove('hidden');
            const inner = document.getElementById('card-inner-element');
            inner.classList.remove('card-flipped');
            inner.style.transformStyle = 'preserve-3d';
            document.getElementById('self-q').innerText = card.q;
            document.getElementById('self-a').innerText = card.a;
            document.getElementById('self-r').innerText = card.r;
            document.getElementById('self-cat').innerText = card.cat;
            document.getElementById('self-cat-back').innerText = card.cat;
        } else {
            document.getElementById('flashcard-ui').classList.add('hidden');
            document.getElementById('interactive-ui').classList.remove('hidden');
            document.getElementById('task-cat').innerText = card.cat;
            document.getElementById('task-type-label').innerText = card.type === 'transfer' ? 'SZENARIO' : 'WISSEN';
            const ctx = document.getElementById('task-context');
            if (card.context) { ctx.innerText = '💡 ' + card.context; ctx.classList.remove('hidden'); }
            else ctx.classList.add('hidden');
            document.getElementById('task-q').innerText = card.q;
            document.getElementById('task-r').innerText = card.r;
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            card.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, btn);
                box.appendChild(btn);
            });
        }
    }

    function checkAnswer(idx, btn) {
        if (isAnswered) return;
        isAnswered = true;
        const card = currentSession[currIdx];
        const correct = idx === card.correct;
        if (correct) {
            btn.style.background = '#10b981';
            btn.style.color = 'white';
            btn.style.borderColor = '#059669';
        } else {
            btn.style.background = '#f43f5e';
            btn.style.color = 'white';
            btn.style.borderColor = '#e11d48';
        }
        showFeedback(correct);
        moveCard(correct);
    }

    function showFeedback(isCorrect) {
        const fBox = document.getElementById('feedback-box');
        fBox.classList.remove('hidden', 'border-emerald-400', 'border-rose-400');
        fBox.style.borderColor = isCorrect ? '#34d399' : '#fb7185';
        document.getElementById('feedback-icon').innerText = isCorrect ? '✅' : '❌';
        const title = document.getElementById('feedback-title');
        title.innerText = isCorrect ? 'Richtig!' : 'Knapp daneben!';
        title.style.color = isCorrect ? '#059669' : '#e11d48';
    }

    function flipCard() {
        const inner = document.getElementById('card-inner-element');
        inner.classList.add('card-flipped');
        setTimeout(() => { inner.style.transformStyle = 'flat'; }, 600);
    }
    function handleResult(correct) { moveCard(correct); handleNext(); }

    function moveCard(correct) {
        const card = currentSession[currIdx];
        userProgress[card.id] = correct ? Math.min(4, userProgress[card.id] + 1) : 1;
        localStorage.setItem('anatomie_profi_final_v1', JSON.stringify(userProgress));
        updateStats();
    }

    function handleNext() {
        currIdx++;
        if (currIdx < currentSession.length) showCard();
        else {
            document.getElementById('interactive-ui').classList.add('hidden');
            document.getElementById('flashcard-ui').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            document.querySelector('#start-screen .start-title').innerText = 'Gut gemacht!';
        }
    }

    function resetProgress() {
        if (confirm('Wirklich alles zurücksetzen?')) {
            localStorage.removeItem('anatomie_profi_final_v1');
            location.reload();
        }
    }

    function showLevelUp(rankName) {
        document.getElementById('level-up-overlay').classList.remove('hidden');
        document.getElementById('new-rank-name').innerText = rankName;
        const area = document.getElementById('confetti-area');
        area.innerHTML = '';
        for (let i = 0; i < 30; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + '%';
            c.style.backgroundColor = `hsl(${Math.random()*360},70%,50%)`;
            c.style.animationDelay = Math.random() * 2 + 's';
            area.appendChild(c);
        }
    }

    function closeLevelUp() { document.getElementById('level-up-overlay').classList.add('hidden'); }

    window.onload = init;
    </script>
</body>
